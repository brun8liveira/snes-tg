<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Top Gear</title>

<!-- FIX iOS viewport -->
<script>
function setVH() {
  let vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', setVH);
</script>

<style>
html, body {
  margin: 0;
  background: black;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

#game {
  width: 100vw;
  height: calc(var(--vh, 1vh) * 100);
  position: relative;
}

#overlay {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  cursor: pointer;
}

/* Corrige layout interno do EmulatorJS */
.ejs--container {
  height: 100% !important;
}

#game canvas {
  position: absolute !important;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<div id="overlay">▶ TOCAR PARA JOGAR</div>
<div id="game"></div>

<script>
/* =========================
   DETECÇÃO iOS
========================= */
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

/* =========================
   CONFIG EMULATORJS
========================= */
EJS_player = "#game";
EJS_core = "snes";
EJS_gameUrl = "roms/tg.sfc";
EJS_pathtodata = "data/";

EJS_threads = false; // CRÍTICO para iOS
EJS_disableDebug = true;
EJS_startOnLoaded = false;
EJS_fullscreenOnLoaded = false;

/* remove botão bugado interno */
EJS_hidePlayButton = true;

/* fallback iOS */
if (isIOS) {
  console.log("Modo iOS ativado");
  EJS_threads = false;
}

/* =========================
   INICIAR AO TOQUE
========================= */
document.getElementById("overlay").addEventListener("click", () => {
  const overlay = document.getElementById("overlay");
  overlay.remove();

  // carregar emulator somente após interação
  const script = document.createElement("script");
  script.src = "data/loader.js";

  script.onload = () => {
    if (window.EJS_start) {
      EJS_start();
    }
  };

  document.body.appendChild(script);

  // fullscreen
  document.documentElement.requestFullscreen?.();
});
</script>

</body>
</html>
