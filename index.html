<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Top Gear</title>

<!-- PRELOAD (ajuda MUITO no iOS) -->
<link rel="preload" href="data/loader.js" as="script">

<style>
html, body {
  margin: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}
#game {
  width: 100vw;
  height: 100vh;
}
#overlay {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="overlay">▶ TOCAR PARA JOGAR</div>
<div id="game"></div>

<script>
/* =========================
   DETECÇÃO DE DISPOSITIVO
========================= */
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

/* =========================
   CONFIG EMULATORJS
========================= */
EJS_player = "#game";
EJS_core = "snes"; // SNES9x
EJS_gameUrl = "roms/tg.sfc";
EJS_pathtodata = "data/";

/* 🔥 CRÍTICO PARA iOS */
EJS_threads = false;

/* estabilidade */
EJS_disableDebug = true;
EJS_startOnLoaded = false; // vamos iniciar manualmente
EJS_fullscreenOnLoaded = false;

/* fallback iOS (opcional, melhora estabilidade) */
if (isIOS) {
  console.log("Modo iOS ativado");
  EJS_threads = false;
}

/* =========================
   INICIAR APÓS TOQUE
========================= */
document.getElementById("overlay").addEventListener("click", () => {
  const overlay = document.getElementById("overlay");
  overlay.remove();

  // carregar script somente após interação (melhor p/ iOS)
  const script = document.createElement("script");
  script.src = "data/loader.js";

  script.onload = () => {
    // iniciar emulador manualmente
    if (window.EJS_start) {
      EJS_start();
    }
  };

  document.body.appendChild(script);

  // fullscreen (se suportado)
  document.documentElement.requestFullscreen?.();
});
</script>

</body>
</html>
